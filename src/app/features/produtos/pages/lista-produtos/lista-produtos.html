<div class="container">

  <h1 class="titulo">Quintalzin 🌱</h1>

  <div class="filtros">

    <input 
      type="text"
      placeholder="🔎 Buscar produto..."
      [(ngModel)]="busca"
      class="input-busca"
    >

    <select [(ngModel)]="cidade" class="select">
      <option value="">Todas cidades</option>
      <option *ngFor="let c of cidades">{{c}}</option>
    </select>

    <select [(ngModel)]="tipoProduto" class="select">
      <option value="">Todos produtos</option>
      <option *ngFor="let t of tiposProdutos">{{t}}</option>
    </select>

  </div>

  <div class="produtos-grid">

    <div 
  class="produto-card" 
  *ngFor="let produto of produtos"
  (click)="verProduto(produto)"
>

  <div class="produto-img">
    <img [src]="produto.imagem" alt="produto">

    <!-- BADGE -->
    <span class="badge">
      {{produto.quantidade}} disponíveis
    </span>
  </div>

  <div class="produto-info">

    <h2>{{produto.nome}}</h2>

    <p class="produtor">
      👨‍🌾 {{produto.produtor}}
    </p>

    <p class="cidade">
      📍 {{produto.cidade}}
    </p>

    <div class="footer-card">

      <span class="preco">
        R$ {{produto.preco}}
      </span>

      <button 
        class="btn"
        (click)="$event.stopPropagation()"
      >
        WhatsApp
      </button>

    </div>

  </div>

</div>

</div>
